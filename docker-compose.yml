services:
  nginx:
    image: nginx:1.27-alpine
    container_name: chat_nginx
    ports:
      - "80:80"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat_app1
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-}
      MONGODB_URI: ${MONGODB_URI:-}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat_app2
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-}
      MONGODB_URI: ${MONGODB_URI:-}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
